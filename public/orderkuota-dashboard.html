
<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1" name="viewport"/>
<title>OrderKuota Dashboard</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:radial-gradient(circle at top,#2563eb,#0f172a 35%,#020617);color:#fff}
body:before,body:after{content:"";position:fixed;width:420px;height:420px;border-radius:50%;filter:blur(90px);opacity:.22;z-index:-1;animation:f 10s ease-in-out infinite}
body:before{background:#22c55e;left:-120px;top:-100px}
body:after{background:#06b6d4;right:-120px;bottom:-100px;animation-delay:-5s}
@keyframes f{50%{transform:translateY(-30px) scale(1.08)}}
.container{max-width:1200px;margin:auto;padding:30px}
.card{background:rgba(255,255,255,.08);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:22px;margin-bottom:20px;box-shadow:0 20px 50px rgba(0,0,0,.35)}
h1,h2{margin-top:0} h2{color:#7dd3fc}
input{width:100%;padding:13px;border-radius:14px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.06);color:#fff}
input:focus{outline:none;border-color:#22c55e;box-shadow:0 0 0 4px rgba(34,197,94,.15)}
button{padding:12px 18px;border:none;border-radius:14px;font-weight:700;cursor:pointer;transition:.2s}
button:hover{transform:translateY(-2px)}
.btn-primary{background:#06b6d4;color:#fff}.btn-success{background:#22c55e;color:#fff}.btn-warning{background:#f59e0b;color:#fff}.btn-danger{background:#ef4444;color:#fff}
.row{display:grid;grid-template-columns:1fr 1fr;gap:20px}
table{width:100%;border-collapse:collapse;border-radius:14px;overflow:hidden}
th{background:#0b1220;color:#7dd3fc}
th,td{border:1px solid rgba(255,255,255,.08);padding:12px}
pre{background:#08111f;border-radius:14px;padding:15px}
.qr-box img{max-width:300px;border-radius:18px}
@media(max-width:800px){.row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
<div class="card">
<h1>🚀 OrderKuota Dashboard</h1>
</div>
<div class="row">
<div class="card">
<h2>🔐 Login OrderKuota</h2>
<label>Username</label>
<input id="username"/>
<label>Password</label>
<input id="password" type="password"/>
<button class="btn-primary" onclick="getOtp()">
KIRIM OTP
</button>
<br/><br/>
<label>OTP</label>
<input id="otp"/>
<button class="btn-success" onclick="getToken()">
AMBIL TOKEN
</button>
<br/><br/>
<label>Token</label>
<div class="token-row">
<input id="token"/>
<button class="btn-warning" onclick="copyToken()">
COPY
</button>
<button class="btn-success" onclick="saveToken()">
SIMPAN
</button>
</div>
</div>
<div class="card">
<h2>👤 Akun Aktif</h2>
<div class="profile-box">
<div>
Username :
<b id="activeUser">-</b>
</div>
<div>
Saldo QRIS :
<b id="saldoQris">Rp 0</b>
</div>
</div>
<br/>
<button class="btn-primary" onclick="refreshProfile()">
REFRESH PROFILE
</button>
</div>
</div>
<div class="card">
<h2>📄 Mutasi Terbaru</h2>
<table>
<thead>
<tr>
<th>Waktu</th>
<th>Nominal</th>
<th>Keterangan</th>
</tr>
</thead>
<tbody id="mutasiBody">
<tr>
<td colspan="3">
Belum ada data
</td>
</tr>
</tbody>
</table>
</div>
<div class="card">
<h2>💳 Test QRIS</h2>
<label>Nominal</label>
<input id="qrisAmount" value="10000"/>
<button class="btn-success" onclick="generateQRIS()">
GENERATE QRIS
</button>
<div class="qr-box">
<img id="qrImage" style="display:none;"/>
</div>
</div>
<div class="card">
<h2>📦 Response Debug</h2>
<pre id="result">
Ready...
</pre>
</div>
</div>
<script>

function showResult(data){
    document.getElementById("result")
        .textContent =
        JSON.stringify(data,null,2);
}

async function getOtp(){

    const username =
        document.getElementById("username").value;

    const password =
        document.getElementById("password").value;

    const res =
        await fetch(
            `/orderkuota/getotp?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
        );

    const json =
        await res.json();

    showResult(json);
}

async function getToken(){

    const username =
        document.getElementById("username").value;

    const otp =
        document.getElementById("otp").value;

    const res =
        await fetch(
            `/orderkuota/gettoken?username=${encodeURIComponent(username)}&otp=${encodeURIComponent(otp)}`
        );

    const json =
        await res.json();

    showResult(json);

    const token =
        json?.results?.auth_token ||
        json?.auth_token ||
        "";

    document.getElementById("token").value =
        token;
}

function copyToken(){

    const token =
        document.getElementById("token").value;

    navigator.clipboard.writeText(token);

    alert("Token berhasil dicopy");
}

async function saveToken(){

    const username =
        document.getElementById("username").value;

    const token =
        document.getElementById("token").value;

    const res =
        await fetch("/orderkuota/save-token",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                username,
                token
            })
        });

    const json =
        await res.json();

    showResult(json);
}

async function refreshProfile(){

    try {

        const res =
            await fetch("/orderkuota/profile");

        const json =
            await res.json();

        showResult(json);

        document.getElementById(
            "activeUser"
        ).textContent =
            json?.account?.results?.username ||
            "-";

        document.getElementById(
            "saldoQris"
        ).textContent =
            "Rp " +
            (
                json?.account?.results?.qris_balance_str ||
                "0"
            );

    } catch(err){

        console.error(err);

    }

}

async function loadMutasi(){

    const res =
        await fetch("/orderkuota/mutasi");

    const data =
        await res.json();

    const tbody =
        document.getElementById("mutasiBody");

    tbody.innerHTML = "";

    data.slice(0,20).forEach(item=>{

        tbody.innerHTML += `
        <tr>
            <td>${item.tanggal || "-"}</td>
            <td>${item.kredit || "-"}</td>
            <td>${item.keterangan || "-"}</td>
        </tr>
        `;
    });
}

async function generateQRIS(){

    alert(
        "Endpoint generate QRIS admin belum dibuat."
    );
}

loadMutasi();

</script>
</body>
</html>
