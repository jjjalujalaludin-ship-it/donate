<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eliana Interactive Donation</title>
<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:Segoe UI,Arial,sans-serif;
background:radial-gradient(circle at top,#312e81,#111827 60%,#020617);
color:#fff;display:flex;justify-content:center;align-items:center;
min-height:100vh;padding:20px;overflow:auto}
.card{
width:100%;max-width:480px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.08);
border-radius:22px;padding:28px;
box-shadow:0 20px 60px rgba(0,0,0,.45)}
.logo{font-size:52px;text-align:center}
h1{text-align:center;margin:8px 0 0;font-size:28px}
.sub{text-align:center;color:#cbd5e1;margin:6px 0 24px}
label{display:block;margin:14px 0 6px;font-weight:600}
input,textarea{
width:100%;padding:13px;border-radius:12px;
border:none;outline:none;
background:rgba(255,255,255,.08);color:#fff;font-size:15px}
textarea{height:90px;resize:none}
::placeholder{color:#94a3b8}
.quick{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.quick button{
padding:10px;border:none;border-radius:10px;
background:#334155;color:#fff;cursor:pointer}
.quick button:hover{background:#16a34a}
.summary{
margin-top:18px;padding:14px;border-radius:14px;
background:rgba(255,255,255,.06);
line-height:1.8;font-size:14px}
.warn{color:#facc15;font-size:13px;margin-top:10px;min-height:18px}
.submit{
margin-top:18px;width:100%;padding:15px;
border:none;border-radius:14px;
background:linear-gradient(135deg,#22c55e,#15803d);
font-size:16px;font-weight:700;color:#fff;cursor:pointer}
.submit:hover{transform:translateY(-2px)}
.note{text-align:center;margin-top:16px;font-size:13px;color:#cbd5e1}
</style>
</head>
<body>
<div class="card">
<div class="logo">💜</div>
<h1>ELIANA INTERACTIVE</h1>
<div class="sub">Support The Stream</div>

<form id="form">
<label>Nama</label>
<input id="nameInput" name="name" placeholder="Nama kamu" required>

<label>Nominal Donasi</label>
<input id="amount" type="text" placeholder="10.000" required>

<div class="quick">
<button type="button" data-v="10000">10K</button>
<button type="button" data-v="20000">20K</button>
<button type="button" data-v="50000">50K</button>
<button type="button" data-v="100000">100K</button>
<button type="button" data-v="250000">250K</button>
<button type="button" data-v="500000">500K</button>
</div>

<label>Pesan</label>
<textarea name="message" placeholder="Tulis pesan..."></textarea>

<label>Media Share (Opsional)</label>
<input id="media" name="media_url" placeholder="https://youtube.com/...">

<div class="warn" id="warn"></div>

<div class="summary">
<div>👤 <b id="sName">-</b></div>
<div>💰 <b id="sAmount">Rp 0</b></div>
<div>🎬 <b id="sVideo">0 detik</b></div>
</div>

<button class="submit" id="submitBtn">💚 DONATE SEKARANG</button>
</form>

<div class="note">
🎬 Media Share minimum Rp10.000<br>
⏱ Rp200 = 1 detik video
</div>
</div>

<script>
const form=document.getElementById("form");
const nameInput=document.getElementById("nameInput");
const amount=document.getElementById("amount");
const media=document.getElementById("media");
const warn=document.getElementById("warn");

const saved=localStorage.getItem("donation_name");
if(saved) nameInput.value=saved;

function rawValue(){
 return Number(amount.value.replace(/\./g,""))||0;
}
function format(n){
 return n.toLocaleString("id-ID");
}
function refresh(){
 localStorage.setItem("donation_name",nameInput.value);
 document.getElementById("sName").innerText=nameInput.value||"-";
 const v=rawValue();
 document.getElementById("sAmount").innerText="Rp "+format(v);
 document.getElementById("sVideo").innerText=Math.floor(v/200)+" detik";
 if(media.value && v<10000){
   warn.textContent="⚠ Media Share minimum Rp10.000";
 }else{
   warn.textContent="";
 }
}
nameInput.oninput=refresh;
media.oninput=refresh;
amount.oninput=()=>{
 let v=amount.value.replace(/\D/g,"");
 if(v) amount.value=format(Number(v));
 refresh();
}
document.querySelectorAll(".quick button").forEach(b=>{
 b.onclick=()=>{amount.value=format(Number(b.dataset.v));refresh();}
});

refresh();

form.onsubmit=async(e)=>{
 e.preventDefault();
 const btn=document.getElementById("submitBtn");
 btn.disabled=true;
 btn.textContent="⏳ Membuat QRIS...";
 const data={
   name:nameInput.value,
   amount:rawValue(),
   message:form.message.value,
   media_url:media.value
 };
 // Minimum donasi Rp2.000
if (data.amount < 2000) {
   alert("Minimum donasi adalah Rp2.000");
   btn.disabled = false;
   btn.textContent = "💚 DONATE SEKARANG";
   return;
}
 try{
   const res=await fetch("/donate",{
     method:"POST",
     headers:{"Content-Type":"application/json"},
     body:JSON.stringify(data)
   });
   const json=await res.json();
   if(json.id&&json.qr){
      location.href="/pay.html?id="+json.id;
   }else{
      alert("QRIS gagal dibuat");
   }
 }catch(e){
   alert("Server error");
 }
 btn.disabled=false;
 btn.textContent="💚 DONATE SEKARANG";
};
</script>
</body>
</html>
