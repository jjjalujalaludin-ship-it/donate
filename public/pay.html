<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Eliana Interactive - Pembayaran</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Inter,Segoe UI,sans-serif;background:linear-gradient(135deg,#0b1220,#2e1065,#1d4ed8);background-size:300% 300%;animation:bg 14s ease infinite;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px}
@keyframes bg{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}
.card{max-width:560px;width:100%;background:rgba(255,255,255,.08);backdrop-filter:blur(22px);border:1px solid rgba(255,255,255,.12);border-radius:28px;padding:30px;text-align:center;box-shadow:0 25px 70px rgba(0,0,0,.45)}
.avatar{width:90px;height:90px;border-radius:50%;margin:auto;background:linear-gradient(135deg,#9333ea,#22c55e);display:flex;align-items:center;justify-content:center;font-size:42px;box-shadow:0 0 30px rgba(147,51,234,.55)}
.badge{display:inline-block;margin:16px 0;padding:8px 18px;border-radius:999px;background:#22c55e22;border:1px solid #22c55e55}
.sub{color:#cbd5e1}
.qr{display:inline-block;background:#fff;padding:18px;border-radius:22px;margin:22px auto;transition:.25s}
.qr:hover{transform:scale(1.04)}
.qr img{width:270px;display:block}
.amount{font-size:34px;font-weight:800;color:#4ade80;margin:16px 0}
.status{margin:16px auto;padding:14px;border-radius:16px;background:rgba(255,255,255,.06)}
.timer{font-size:30px;font-weight:800;color:#fde047}
.danger{color:#ef4444!important}
.progress{height:10px;background:#1e293b;border-radius:999px;overflow:hidden;margin-top:12px}
.bar{height:100%;width:100%;background:linear-gradient(90deg,#22c55e,#84cc16);transition:width 1s linear}
.btn{width:100%;margin-top:20px;padding:15px;border:none;border-radius:15px;background:linear-gradient(135deg,#22c55e,#16a34a);font-size:17px;font-weight:700;color:#fff;cursor:pointer}
.footer{margin-top:18px;color:#cbd5e1;font-size:13px;line-height:1.6}
.success{color:#4ade80}
</style>
</head>
<body>
<div class="card" id="card">
<div class="avatar">💜</div>
<div class="badge">ELIANA INTERACTIVE</div>
<h1>Scan QRIS</h1>
<p class="sub">Scan QRIS menggunakan E‑Wallet atau Mobile Banking.<br>Nominal sudah otomatis sesuai tagihan.</p>
<div class="qr"><img id="qr"></div>
<div class="amount" id="amount">Rp 0</div>
<div class="status">
<div id="statusText">🟡 Menunggu Pembayaran...</div>
<div class="timer" id="timer">03:00</div>
<div class="progress"><div class="bar" id="bar"></div></div>
</div>
<button class="btn" id="checkBtn" onclick="checkPayment()">🔍 CEK PEMBAYARAN</button>
<div class="footer">🤖 Sistem mengecek pembayaran otomatis setiap 15 detik.</div>
</div>
<script>

const id =
    new URLSearchParams(location.search)
    .get("id");

const card =
    document.getElementById("card");

let createdAt;
let countdown;

const EXPIRE = 180000;

const fmt = s =>
`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;

function stop(){
    clearInterval(countdown);
}

function paymentSuccess(){

    stop();

    card.innerHTML = `
    <div class="avatar">✅</div>
    <h1 class="success">
        Pembayaran Berhasil
    </h1>

    <p class="sub">
        Terima kasih telah mendukung
        Eliana Interactive 💚
    </p>

    <h2>
        Redirect dalam
        <span id="c">3</span>...
    </h2>
    `;

    let n = 3;

    const t = setInterval(()=>{

        document.getElementById("c")
        .textContent = --n;

        if(n <= 0){

            clearInterval(t);

            location.href="/";

        }

    },1000);

}

function startTimer(){

    countdown = setInterval(()=>{

        const left =
            Math.floor(
                (createdAt + EXPIRE - Date.now())
                / 1000
            );

        if(left <= 0){

            stop();

            card.innerHTML = `
            <div class="avatar">⏰</div>
            <h1>QRIS Expired</h1>
            <p class="sub">
                Silakan buat pembayaran baru.
            </p>

            <button
                class="btn"
                onclick="location.href='/'"
            >
                💚 DONASI LAGI
            </button>
            `;

            return;
        }

        timer.textContent =
            fmt(left);

        if(left <= 20){

            timer.classList.add(
                "danger"
            );

        }

        bar.style.width =
            (left / 180 * 100) + "%";

    },1000);

}

async function load(){

    const r =
        await fetch(
            "/donation/" + id
        );

    const d =
        await r.json();

    if(!d || !d.qr){

        card.innerHTML =
        "<h2>QRIS tidak ditemukan</h2>";

        return;

    }

    createdAt =
        d.created_at;

    qr.src =
        d.qr;

    amount.textContent =
        "Rp " +
        Number(d.amount_unique)
        .toLocaleString("id-ID");

    startTimer();

    connectWS();

}

load();

function connectWS(){

    const protocol =
        location.protocol === "https:"
        ? "wss:"
        : "ws:";

    const ws =
        new WebSocket(
            `${protocol}//${location.host}/ws`
        );

    ws.onopen = ()=>{

        console.log(
            "WS Connected"
        );

        ws.send(
            JSON.stringify({
                type:"watch_payment",
                id:id
            })
        );

        const btn =
            document.getElementById(
                "checkBtn"
            );

        btn.textContent =
            "🟢 REALTIME AKTIF";

    };

    ws.onmessage = (event)=>{

        try{

            const msg =
                JSON.parse(
                    event.data
                );

            if(
                msg.type ===
                "payment_paid"
                &&
                String(msg.id)
                ===
                String(id)
            ){

                paymentSuccess();

            }

        }catch(err){

            console.error(err);

        }

    };

    ws.onclose = ()=>{

        console.log(
            "WS Disconnected"
        );

        const btn =
            document.getElementById(
                "checkBtn"
            );

        btn.textContent =
            "🔴 RECONNECTING...";

        setTimeout(
            connectWS,
            3000
        );

    };

}

async function checkPayment(){

    alert(
        "Realtime aktif. Sistem akan otomatis mendeteksi pembayaran."
    );

}

</script>
</body>
</html>
